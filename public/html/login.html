<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Farmacia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .login-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 50px 40px;
      width: 100%;
      max-width: 400px;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header i {
      font-size: 3rem;
      color: #667eea;
      margin-bottom: 15px;
    }

    .login-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 5px;
    }

    .login-header p {
      color: #999;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-control {
      border: 2px solid #eee;
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      outline: none;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      border-radius: 8px;
      margin-bottom: 20px;
      animation: slideIn 0.3s ease-out;
    }

    .demo-users {
      background: #f5f7fa;
      border-radius: 8px;
      padding: 15px;
      margin-top: 25px;
      border-left: 4px solid #667eea;
    }

    .demo-users h6 {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }

    .demo-user {
      font-size: 0.8rem;
      color: #666;
      margin: 5px 0;
      font-family: 'Courier New', monospace;
    }

    .demo-user strong {
      color: #333;
    }

    .spinner-border {
      width: 20px;
      height: 20px;
      margin-right: 8px;
    }

    .loading {
      display: none;
    }

    .loading.show {
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Encabezado -->
    <div class="login-header">
      <i class="fas fa-pills"></i>
      <h1>Farmacia</h1>
      <p>Sistema de Gestión</p>
    </div>

    <!-- Alertas -->
    <div id="alertContainer"></div>

    <!-- Formulario -->
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="usuario" class="form-label">Usuario o correo</label>
        <input type="text" class="form-control" id="usuario" placeholder="Ingrese su usuario o correo" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="contrasena" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="contrasena" placeholder="Ingrese su contraseña" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-login" id="btnLogin">
        <span class="loading" id="spinner">
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        </span>
        Iniciar Sesión
      </button>
    </form>

    <!-- Usuarios demo -->
    <div class="demo-users">
      <h6>👤 Usuario de prueba:</h6>
      <div class="demo-user"><strong>Usuario:</strong> farmacia@gmail.com | <strong>Pass:</strong> farmacia1234</div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';

    async function handleLogin(event) {
      event.preventDefault();

      const usuario = document.getElementById('usuario').value.trim();
      const contrasena = document.getElementById('contrasena').value;
      const btnLogin = document.getElementById('btnLogin');
      const spinner = document.getElementById('spinner');

      if (!usuario || !contrasena) {
        mostrarAlerta('Complete todos los campos', 'warning');
        return false;
      }

      // Mostrar spinner
      btnLogin.disabled = true;
      spinner.classList.add('show');

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ usuario, contrasena })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Error en la autenticación');
        }

        // Guardar token en localStorage
        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));

        mostrarAlerta('¡Bienvenido! Redirigiendo...', 'success');

        // Redirigir después de 1 segundo
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 1000);

      } catch (error) {
        console.error('Error:', error);
        mostrarAlerta(error.message || 'Error al iniciar sesión', 'danger');
        btnLogin.disabled = false;
        spinner.classList.remove('show');
      }

      return false;
    }

    function mostrarAlerta(mensaje, tipo) {
      const alertContainer = document.getElementById('alertContainer');
      const alertHtml = `
        <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
          ${mensaje}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
      alertContainer.innerHTML = alertHtml;

      // Auto-descartar después de 5 segundos
      if (tipo !== 'danger') {
        setTimeout(() => {
          alertContainer.innerHTML = '';
        }, 5000);
      }
    }

    // Auto-llenar usuario de prueba (opcional)
    document.addEventListener('DOMContentLoaded', () => {
      // Verificar si ya hay sesión activa
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = '/index.html';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
