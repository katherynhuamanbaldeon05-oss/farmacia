<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Farmacia System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-pills"></i> Farmacia System
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="medicamentos.html">Medicamentos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="clientes.html">Clientes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="ventas.html">Ventas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="reportes.html">Reportes</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-5">
    <div class="row mb-4">
      <div class="col-md-8">
        <h1><i class="fas fa-users"></i> Gestión de Clientes</h1>
      </div>
      <div class="col-md-4 text-end">
        <button class="btn btn-success btn-lg" data-bs-toggle="modal" data-bs-target="#clienteModal">
          <i class="fas fa-user-plus"></i> Nuevo Cliente
        </button>
      </div>
    </div>

    <!-- Búsqueda por DNI -->
    <div class="row mb-4">
      <div class="col-md-12">
        <div class="input-group">
          <input 
            type="text" 
            class="form-control form-control-lg" 
            placeholder="Buscar por DNI..." 
            id="buscarDNI"
            maxlength="8"
          >
          <button class="btn btn-outline-success" type="button" id="btnBuscarDNI">
            <i class="fas fa-search"></i> Buscar
          </button>
        </div>
      </div>
    </div>

    <!-- Tabla de clientes -->
    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead class="table-success">
                  <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>DNI</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Puntos</th>
                    <th>Beneficio</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="clientesBody">
                  <tr><td colspan="8" class="text-center text-muted">Cargando...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Cliente -->
  <div class="modal fade" id="clienteModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nuevo Cliente</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="clienteForm">
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="nombre" class="form-label">Nombre *</label>
                  <input type="text" class="form-control" id="nombre" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="apellido" class="form-label">Apellido *</label>
                  <input type="text" class="form-control" id="apellido" required>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="dni" class="form-label">DNI *</label>
                  <input type="text" class="form-control" id="dni" maxlength="8" pattern="[0-9]{8}" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" class="form-control" id="email">
                </div>
              </div>
            </div>
            <div class="mb-3">
              <label for="telefono" class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="telefono">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-success" id="btnGuardarCliente">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">&copy; 2024 Sistema de Gestión de Farmacia</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api-client.js"></script>
  <script src="../js/clientes.js"></script>
</body>
</html>
