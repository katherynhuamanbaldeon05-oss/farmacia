<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medicamentos - Farmacia System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-pills"></i> Farmacia System
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="medicamentos.html">Medicamentos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="clientes.html">Clientes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="ventas.html">Ventas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="reportes.html">Reportes</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-5">
    <div class="row mb-4">
      <div class="col-md-8">
        <h1><i class="fas fa-pills"></i> Gestión de Medicamentos</h1>
      </div>
      <div class="col-md-4 text-end">
        <button class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#medicamentoModal">
          <i class="fas fa-plus"></i> Nuevo Medicamento
        </button>
      </div>
    </div>

    <!-- Búsqueda -->
    <div class="row mb-4">
      <div class="col-md-12">
        <div class="input-group">
          <input 
            type="text" 
            class="form-control form-control-lg" 
            placeholder="Buscar medicamento..." 
            id="buscarMedicamento"
          >
          <button class="btn btn-outline-primary" type="button" id="btnBuscar">
            <i class="fas fa-search"></i> Buscar
          </button>
        </div>
      </div>
    </div>

    <!-- Tabla de medicamentos -->
    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead class="table-primary">
                  <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="medicamentosBody">
                  <tr><td colspan="7" class="text-center text-muted">Cargando...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Medicamento -->
  <div class="modal fade" id="medicamentoModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Nuevo Medicamento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="medicamentoForm">
            <input type="hidden" id="medicamentoId">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre *</label>
              <input type="text" class="form-control" id="nombre" required>
            </div>
            <div class="mb-3">
              <label for="descripcion" class="form-label">Descripción</label>
              <textarea class="form-control" id="descripcion" rows="3"></textarea>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="precio" class="form-label">Precio (S/) *</label>
                  <input type="number" class="form-control" id="precio" step="0.01" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="cantidad" class="form-label">Cantidad *</label>
                  <input type="number" class="form-control" id="cantidad" required>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-primary" id="btnGuardarMedicamento">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">&copy; 2024 Sistema de Gestión de Farmacia</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth-util.js"></script>
  <script src="../js/api-client.js"></script>
  <script src="../js/medicamentos.js"></script>
</body>
</html>
